x-build-args: &build-args
  NVIM_VERSION: ${NVIM_VERSION:-v0.12.1}
  FD_VERSION: ${FD_VERSION:-v10.2.0}
  RIPGREP_VERSION: ${RIPGREP_VERSION:-14.1.1}
  TREE_SITTER_CLI_VERSION: ${TREE_SITTER_CLI_VERSION:-v0.26.1}

x-smoke-env: &smoke-env
  CC: gcc
  COLORTERM: truecolor
  TERM: xterm-256color

x-shell-env: &shell-env
  CC: gcc
  COLORTERM: ${COLORTERM:-truecolor}
  TERM: ${TERM:-xterm-256color}
  TERM_PROGRAM: ${TERM_PROGRAM:-}
  TMUX: ${TMUX:-}
  KITTY_WINDOW_ID: ${KITTY_WINDOW_ID:-}
  WEZTERM_PANE: ${WEZTERM_PANE:-}
  ZELLIJ: ${ZELLIJ:-}
  SSH_TTY: ${SSH_TTY:-}

x-service-base: &service-base
  working_dir: ${NVIM_CONFIG_DIR:?set NVIM_CONFIG_DIR}
  environment:
    <<: *smoke-env
  volumes:
    - ${NVIM_CONFIG_DIR:?set NVIM_CONFIG_DIR}:${NVIM_CONFIG_DIR:?set NVIM_CONFIG_DIR}

x-shell-base: &shell-base
  <<: *service-base
  environment:
    <<: *shell-env
    NVIM_CLIPBOARD: osc52
  tty: true
  stdin_open: true

services:
  arch-smoke:
    <<: *service-base
    build:
      context: ..
      dockerfile: docker/arch.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: arch
    command: ["/opt/nvim-harness/smoke.sh", "arch"]

  arch-shell:
    <<: *shell-base
    build:
      context: ..
      dockerfile: docker/arch.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: arch
    command: ["/opt/nvim-harness/shell.sh"]

  ubuntu-smoke:
    <<: *service-base
    environment:
      <<: *smoke-env
      VVN_NVIM_PROFILE: standard
    build:
      context: ..
      dockerfile: docker/ubuntu.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: ubuntu
    command: ["/opt/nvim-harness/smoke.sh", "ubuntu", "standard"]

  ubuntu-smoke-minimal:
    <<: *service-base
    environment:
      <<: *smoke-env
      VVN_NVIM_PROFILE: minimal
    build:
      context: ..
      dockerfile: docker/ubuntu.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: ubuntu
    command: ["/opt/nvim-harness/smoke.sh", "ubuntu", "minimal"]

  ubuntu-shell:
    <<: *shell-base
    environment:
      <<: *shell-env
      VVN_NVIM_PROFILE: standard
    build:
      context: ..
      dockerfile: docker/ubuntu.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: ubuntu
    command: ["/opt/nvim-harness/shell.sh", "standard"]

  ubuntu-shell-minimal:
    <<: *shell-base
    environment:
      <<: *shell-env
      VVN_NVIM_PROFILE: minimal
    build:
      context: ..
      dockerfile: docker/ubuntu.Dockerfile
      args:
        <<: *build-args
        TARGET_OS: ubuntu
    command: ["/opt/nvim-harness/shell.sh", "minimal"]
